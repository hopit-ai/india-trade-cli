name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install core deps needed for tests (skip heavy broker/AI SDKs)
          pip install rich textual prompt_toolkit pandas numpy yfinance httpx \
                      feedparser fpdf2 python-dotenv keyring pyotp \
                      python-dateutil pytz
          pip install pytest pytest-mock

      - name: Run tests
        run: pytest tests/ -v --tb=short -m "not network"

  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        continue-on-error: true
        run: ruff check .

      - name: Format check
        continue-on-error: true
        run: ruff format --check .
