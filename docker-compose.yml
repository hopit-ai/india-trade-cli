# ── India Trade CLI — Docker Compose ─────────────────────────
#
# Usage:
#   docker compose up cli          # Interactive REPL
#   docker compose up bot          # Telegram bot
#   docker compose up web          # Web UI (port 8765)
#   docker compose up              # All services
#
# First time: copy .env.example to .env and fill in your keys

services:
  # ── Interactive CLI (default) ──────────────────────────────
  cli:
    build: .
    container_name: trade-cli
    stdin_open: true
    tty: true
    env_file: .env
    volumes:
      - ~/.trading_platform:/root/.trading_platform    # share tokens, memory, alerts with host
      - ./output:/output                                # PDF exports
      - .:/app                                          # hot reload: mount source code
      - ~/.claude:/root/.claude                         # Claude CLI auth (for claude_subscription)
    environment:
      - PDF_OUTPUT_DIR=/output
      - PYTHONDONTWRITEBYTECODE=1
    command: python -m app.main

  # ── Telegram Bot ───────────────────────────────────────────
  bot:
    build: .
    container_name: trade-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ~/.trading_platform:/root/.trading_platform
      - .:/app                                 # hot reload
      - ~/.claude:/root/.claude
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    command: python -m bot.telegram_bot

  # ── Web API ────────────────────────────────────────────────
  web:
    build: .
    container_name: trade-web
    restart: unless-stopped
    ports:
      - "8765:8765"
    env_file: .env
    volumes:
      - ~/.trading_platform:/root/.trading_platform
      - .:/app                                 # hot reload
      - ~/.claude:/root/.claude
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    command: uvicorn web.api:app --host 0.0.0.0 --port 8765 --reload

# No Docker volumes needed — host directories are mounted directly:
#   ~/.trading_platform  → tokens, memory, alerts (shared with local CLI)
#   ~/.claude            → Claude CLI auth
#   ./output             → PDF exports
